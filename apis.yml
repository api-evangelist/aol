apis:
  - name: Yahoo Developer Network (formerly AOL Developer)
    description: >-
      Following AOL's acquisition by Verizon and subsequent merger with Yahoo,
      AOL developer APIs have been consolidated into the Yahoo Developer Network.
      Yahoo/AOL APIs provide access to advertising services, weather, finance,
      search, and identity services for developers building on the Oath/Verizon
      Media platform.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
