name: AOL
description: >-
  AOL (America Online) is a digital media company and a division of Verizon
  Media (now Yahoo). AOL operates news and entertainment properties including
  AOL.com, Engadget, and TechCrunch. Historically, AOL provided developer APIs
  for advertising, content, and identity services that have since been
  consolidated into the Yahoo/Verizon Media API ecosystem.
